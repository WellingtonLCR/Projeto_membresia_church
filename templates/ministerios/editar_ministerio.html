{% extends "base.html" %}

{% block titulo %}Editar Ministério{% endblock %}

{% block conteudo %}
<h1 class="h3 mb-3">Editar Ministério</h1>

<form method="post" class="card card-body shadow-sm bg-white">
    <div class="row g-3">
        <div class="col-md-6">
            <label for="nome" class="form-label">Nome do Ministério</label>
            <input type="text" class="form-control" id="nome" name="nome" value="{{ ministerio.nome }}" required>
        </div>
        <div class="col-md-6">
            <label for="lider" class="form-label">Líder responsável</label>
            <input type="text" class="form-control" id="lider" name="lider" value="{{ ministerio.lider }}" required>
        </div>
        <div class="col-md-6">
            <label for="dia_reuniao" class="form-label">Dia da Reunião</label>
            <select class="form-select" id="dia_reuniao" name="dia_reuniao" required>
                {% for dia in dias %}
                <option value="{{ dia }}" {% if dia == ministerio.dia_reuniao %}selected{% endif %}>{{ dia }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label for="vagas" class="form-label">Vagas disponíveis</label>
            <input type="number" class="form-control" id="vagas" name="vagas" value="{{ ministerio.vagas }}" min="0" required>
        </div>
    </div>
    <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{{ url_for('listar_ministerios') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
