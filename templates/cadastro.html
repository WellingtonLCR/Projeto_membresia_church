{% extends "base_publica.html" %}

{% block titulo %}Cadastro{% endblock %}

{% block conteudo %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h4 mb-3">Novo cadastro</h2>
                <form method="post">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="nome" name="nome"
                            placeholder="Digite seu nome completo" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Digite seu email"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha"
                            placeholder="Crie uma senha segura" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirma_senha" class="form-label">Confirmação de senha</label>
                        <input type="password" class="form-control" id="confirma_senha" name="confirma_senha"
                            placeholder="Repita a senha criada" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Cadastrar</button>
                    <p class="text-center mt-3 mb-0">
                        Ja tem cadastro? <a href="{{ url_for('login') }}">Faca login</a>
                    </p>
                </form>  
            </div>
        </div>
    </div>
</div>
{% endblock %}
