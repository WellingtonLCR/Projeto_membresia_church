{% extends "base.html" %}

{% block titulo %}Inserir Doacao - Painel{% endblock %}

{% block conteudo %}
<div class="page-header mb-4">
    <div>
        <span class="eyebrow">Gestao</span>
        <h1 class="h2 mb-1">Inserir doacao</h1>
        <p class="text-muted mb-0">Ao marcar como recebida, a doacao tambem entra no financeiro como entrada.</p>
    </div>
    <a href="{{ url_for('listar_doacoes') }}" class="btn btn-outline-secondary">Voltar</a>
</div>

<form method="post" class="card form-card">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="membro_id">Membro</label>
                <select class="form-select" id="membro_id" name="membro_id">
                    <option value="">Doador nao vinculado</option>
                    {% for membro in membros %}
                    <option value="{{ membro.id }}">{{ membro.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="doador_nome">Nome do doador</label>
                <input class="form-control" id="doador_nome" name="doador_nome" placeholder="Usar quando nao for membro">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="tipo">Tipo</label>
                <select class="form-select" id="tipo" name="tipo" required>
                    {% for tipo in tipos %}
                    <option value="{{ tipo }}">{{ tipo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="categoria_id">Categoria financeira</label>
                <select class="form-select" id="categoria_id" name="categoria_id" required>
                    {% for categoria in categorias %}
                    <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="conta_id">Conta</label>
                <select class="form-select" id="conta_id" name="conta_id" required>
                    {% for conta in contas %}
                    <option value="{{ conta.id }}">{{ conta.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="valor">Valor</label>
                <input class="form-control" id="valor" name="valor" type="number" min="0.01" step="0.01" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="data_doacao">Data</label>
                <input class="form-control" id="data_doacao" name="data_doacao" type="date" required>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="forma_recebimento">Forma</label>
                <select class="form-select" id="forma_recebimento" name="forma_recebimento" required>
                    {% for forma in formas %}
                    <option value="{{ forma }}">{{ forma }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="status">Status</label>
                <select class="form-select" id="status" name="status" required>
                    {% for status in status_opcoes %}
                    <option value="{{ status }}">{{ status }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="recorrente" name="recorrente">
                    <label class="form-check-label" for="recorrente">Doacao recorrente</label>
                </div>
            </div>
            <div class="col-md-12">
                <label class="form-label" for="observacoes">Observacoes</label>
                <textarea class="form-control" id="observacoes" name="observacoes" rows="3"></textarea>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Salvar</button>
            <a class="btn btn-secondary" href="{{ url_for('listar_doacoes') }}">Cancelar</a>
        </div>
    </div>
</form>
{% endblock %}
