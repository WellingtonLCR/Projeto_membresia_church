{% extends "base.html" %}

{% block titulo %}Cadastrar Evento{% endblock %}

{% block conteudo %}
<div class="page-header mb-4">
    <div>
        <span class="eyebrow">Organização</span>
        <h1 class="h3 mb-1">Cadastrar evento</h1>
        <p class="text-muted mb-0">Registre a agenda e, se houver, carregue um banner para a listagem.</p>
    </div>
</div>

<form method="post" enctype="multipart/form-data" class="card card-body shadow-sm bg-white">
    <div class="row g-3">
        <div class="col-md-6">
            <label for="nome" class="form-label">Nome do evento</label>
            <input type="text" class="form-control" id="nome" name="nome" required>
        </div>
        <div class="col-md-3">
            <label for="data_inicio" class="form-label">Início</label>
            <input type="datetime-local" class="form-control" id="data_inicio" name="data_inicio" required>
        </div>
        <div class="col-md-3">
            <label for="data_fim" class="form-label">Fim</label>
            <input type="datetime-local" class="form-control" id="data_fim" name="data_fim">
        </div>
        <div class="col-md-6">
            <label for="local" class="form-label">Local</label>
            <input type="text" class="form-control" id="local" name="local" required>
        </div>
        <div class="col-md-3">
            <label for="status" class="form-label">Status</label>
            <select class="form-select" id="status" name="status" required>
                {% for status in status_opcoes %}
                <option value="{{ status }}">{{ status }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label for="banner" class="form-label">Banner</label>
            <input type="file" class="form-control" id="banner" name="banner" accept=".jpg,.jpeg,.png,.webp">
        </div>
        <div class="col-12">
            <label for="descricao" class="form-label">Descrição</label>
            <textarea class="form-control" id="descricao" name="descricao" rows="4"></textarea>
        </div>
    </div>
    <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{{ url_for('listar_eventos') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
