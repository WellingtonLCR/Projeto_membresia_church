{% extends "base.html" %}

{% block titulo %}Editar Pessoa{% endblock %}

{% block conteudo %}
<div class="page-header mb-4">
    <div>
        <span class="eyebrow">Cadastro</span>
        <h1 class="h3 mb-1">Editar pessoa</h1>
        <p class="text-muted mb-0">Atualize dados pessoais, contato, ministérios, célula e status.</p>
    </div>
    <a href="{{ url_for('historico_membro', membro_id=membro.id) }}" class="btn btn-outline-primary">Histórico espiritual</a>
</div>

<form method="post" class="card card-body shadow-sm bg-white">
    <div class="form-section-title">Dados pessoais</div>
    <div class="row g-3">
        <div class="col-md-6">
            <label for="nome" class="form-label">Nome completo</label>
            <input type="text" class="form-control" id="nome" name="nome" value="{{ membro.nome }}" required>
        </div>
        <div class="col-md-3">
            <label for="situacao" class="form-label">Status</label>
            <select class="form-select" id="situacao" name="situacao" required>
                {% for situacao in situacoes %}
                <option value="{{ situacao }}" {% if situacao == membro.situacao %}selected{% endif %}>{{ situacao }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label for="cpf" class="form-label">CPF</label>
            <input type="text" class="form-control" id="cpf" name="cpf" value="{{ membro.cpf }}">
        </div>
        <div class="col-md-4">
            <label for="data_nascimento" class="form-label">Data de nascimento</label>
            <input type="date" class="form-control" id="data_nascimento" name="data_nascimento" value="{{ membro.data_nascimento }}">
        </div>
        <div class="col-md-4">
            <label for="estado_civil" class="form-label">Estado civil</label>
            <select class="form-select" id="estado_civil" name="estado_civil">
                <option value="">Selecione</option>
                {% for estado in estados_civis %}
                <option value="{{ estado }}" {% if estado == membro.estado_civil %}selected{% endif %}>{{ estado }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label for="profissao" class="form-label">Profissão</label>
            <input type="text" class="form-control" id="profissao" name="profissao" value="{{ membro.profissao }}">
        </div>
        <div class="col-12">
            <label for="endereco" class="form-label">Endereço</label>
            <input type="text" class="form-control" id="endereco" name="endereco" value="{{ membro.endereco }}">
        </div>
    </div>

    <div class="form-section-title mt-4">Contato</div>
    <div class="row g-3">
        <div class="col-md-4">
            <label for="telefone" class="form-label">Telefone</label>
            <input type="tel" class="form-control" id="telefone" name="telefone" value="{{ membro.telefone }}" required>
        </div>
        <div class="col-md-4">
            <label for="whatsapp" class="form-label">WhatsApp</label>
            <input type="tel" class="form-control" id="whatsapp" name="whatsapp" value="{{ membro.whatsapp }}">
        </div>
        <div class="col-md-4">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ membro.email }}">
        </div>
    </div>

    <div class="form-section-title mt-4">Vínculo eclesiástico</div>
    <div class="row g-3">
        <div class="col-md-4">
            <label for="data_entrada" class="form-label">Data de entrada</label>
            <input type="date" class="form-control" id="data_entrada" name="data_entrada" value="{{ membro.data_entrada }}">
        </div>
        <div class="col-md-4">
            <label for="data_batismo" class="form-label">Data de batismo</label>
            <input type="date" class="form-control" id="data_batismo" name="data_batismo" value="{{ membro.data_batismo }}">
        </div>
        <div class="col-md-4">
            <label for="cargo_funcao" class="form-label">Cargo/função</label>
            <input type="text" class="form-control" id="cargo_funcao" name="cargo_funcao" value="{{ membro.cargo_funcao }}">
        </div>
        <div class="col-md-6">
            <label for="ministerios" class="form-label">Ministérios vinculados</label>
            <select class="form-select" id="ministerios" name="ministerios" multiple size="5">
                {% for nome_ministerio in ministerios %}
                <option value="{{ nome_ministerio }}" {% if nome_ministerio in membro.ministerios %}selected{% endif %}>{{ nome_ministerio }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label for="celula" class="form-label">Célula ou grupo pequeno</label>
            <select class="form-select" id="celula" name="celula">
                <option value="">Sem célula</option>
                {% for celula in celulas %}
                <option value="{{ celula }}" {% if celula == membro.celula %}selected{% endif %}>{{ celula }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{{ url_for('listar_membros') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
