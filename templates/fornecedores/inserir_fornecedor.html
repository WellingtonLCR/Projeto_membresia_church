{% extends "base.html" %}

{% block titulo %}Inserir Fornecedor - Painel{% endblock %}

{% block conteudo %}
<div class="page-header mb-4">
    <div>
        <span class="eyebrow">Gestao</span>
        <h1 class="h2 mb-1">Inserir fornecedor</h1>
        <p class="text-muted mb-0">Use este cadastro ao registrar gastos e saidas no financeiro.</p>
    </div>
    <a href="{{ url_for('listar_fornecedores') }}" class="btn btn-outline-secondary">Voltar</a>
</div>

<form method="post" class="card form-card">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="nome">Nome</label>
                <input class="form-control" id="nome" name="nome" required>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="documento">Documento</label>
                <input class="form-control" id="documento" name="documento" placeholder="CNPJ, CPF ou identificacao">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="telefone">Telefone</label>
                <input class="form-control" id="telefone" name="telefone" placeholder="(14) 99999-9999">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="email">E-mail</label>
                <input class="form-control" id="email" name="email" type="email">
            </div>
            <div class="col-md-12">
                <label class="form-label" for="endereco">Endereco</label>
                <input class="form-control" id="endereco" name="endereco">
            </div>
            <div class="col-md-12">
                <label class="form-label" for="observacoes">Observacoes</label>
                <textarea class="form-control" id="observacoes" name="observacoes" rows="3"></textarea>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Salvar</button>
            <a class="btn btn-secondary" href="{{ url_for('listar_fornecedores') }}">Cancelar</a>
        </div>
    </div>
</form>
{% endblock %}
