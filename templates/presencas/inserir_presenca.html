{% extends "base.html" %}

{% block titulo %}Registrar Presença{% endblock %}

{% block conteudo %}
<div class="page-header mb-4">
    <div>
        <span class="eyebrow">Pessoas</span>
        <h1 class="h3 mb-1">Registrar presença</h1>
        <p class="text-muted mb-0">Informe data, tipo, referência e membro vinculado.</p>
    </div>
</div>

<form method="post" class="card card-body shadow-sm bg-white">
    <div class="row g-3">
        <div class="col-md-3">
            <label for="data_presenca" class="form-label">Data</label>
            <input type="date" class="form-control" id="data_presenca" name="data_presenca" required>
        </div>
        <div class="col-md-3">
            <label for="tipo" class="form-label">Tipo</label>
            <select class="form-select" id="tipo" name="tipo" required>
                <option value="">Selecione</option>
                <option value="Culto">Culto</option>
                <option value="Evento">Evento</option>
                <option value="Celula">Célula</option>
            </select>
        </div>
        <div class="col-md-6">
            <label for="referencia_nome" class="form-label">Referência</label>
            <input type="text" class="form-control" id="referencia_nome" name="referencia_nome" placeholder="Ex: Culto de domingo" required>
        </div>
        <div class="col-md-8">
            <label for="membro_id" class="form-label">Membro</label>
            <select class="form-select" id="membro_id" name="membro_id">
                <option value="">Visitante ou não vinculado</option>
                {% for membro in membros %}
                <option value="{{ membro.id }}">{{ membro.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="presente" name="presente" checked>
                <label class="form-check-label" for="presente">Presente</label>
            </div>
        </div>
    </div>
    <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{{ url_for('listar_presencas') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
