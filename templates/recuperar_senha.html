{% extends "base_publica.html" %}

{% block titulo %}Recuperar senha • Igreja Viva{% endblock %}

{% block conteudo %}
<div class="row justify-content-center align-items-center auth-page">
    <div class="col-lg-5">
        <div class="card auth-card">
            <div class="card-body p-4 p-lg-5">
                <span class="eyebrow">Acesso</span>
                <h1 class="h3 mt-2 mb-2">Recuperar senha</h1>
                <p class="text-muted mb-4">Informe o e-mail cadastrado para iniciar a recuperação de acesso.</p>
                <form method="post" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="seuemail@igreja.org" autocomplete="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enviar instruções</button>
                </form>
                <p class="mt-3 mb-0 text-center"><a href="{{ url_for('login') }}">Voltar ao login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
