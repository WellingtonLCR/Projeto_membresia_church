{% extends "base.html" %}

{% block titulo %}Inserir Pedido - Painel{% endblock %}

{% block conteudo %}
<div class="page-header mb-4">
    <div>
        <span class="eyebrow">Cuidado</span>
        <h1 class="h2 mb-1">Inserir pedido de oracao</h1>
        <p class="text-muted mb-0">Registre o pedido para acompanhamento da equipe de intercessao.</p>
    </div>
    <a href="{{ url_for('listar_intercessao') }}" class="btn btn-outline-secondary">Voltar</a>
</div>

<form method="post" class="card form-card">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="solicitante_nome">Solicitante</label>
                <input class="form-control" id="solicitante_nome" name="solicitante_nome" required>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="contato">Contato</label>
                <input class="form-control" id="contato" name="contato" placeholder="Telefone, WhatsApp ou e-mail">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="categoria">Categoria</label>
                <select class="form-select" id="categoria" name="categoria">
                    <option value="">Sem categoria</option>
                    {% for categoria in categorias %}
                    <option value="{{ categoria }}">{{ categoria }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="privado" name="privado">
                    <label class="form-check-label" for="privado">Pedido privado</label>
                </div>
            </div>
            <div class="col-md-12">
                <label class="form-label" for="pedido">Pedido</label>
                <textarea class="form-control" id="pedido" name="pedido" rows="5" required></textarea>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Salvar</button>
            <a class="btn btn-secondary" href="{{ url_for('listar_intercessao') }}">Cancelar</a>
        </div>
    </div>
</form>
{% endblock %}
