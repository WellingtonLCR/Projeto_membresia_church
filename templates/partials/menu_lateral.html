{% for grupo in menu_lateral %}
    {% if grupo.titulo %}
    <span class="sidebar-section">{{ grupo.titulo }}</span>
    {% endif %}

    {% for item in grupo.itens %}
    <a class="sidebar-link {% if request.endpoint in item.ativos %}active{% endif %}" href="{{ url_for(item.rota) }}">{{ item.label }}</a>
    {% endfor %}
{% endfor %}
